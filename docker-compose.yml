services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - FIREBASE_DB_URL=${FIREBASE_DB_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-asia-south1}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: on-failure:5
    volumes:
      - ./server:/app/server

  client:
    image: node:22-alpine
    working_dir: /app/client
    command: sh -c "npm ci && npm run dev -- -p 3000"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      - NEXT_PUBLIC_FIREBASE_DB_URL=${NEXT_PUBLIC_FIREBASE_DB_URL}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    volumes:
      - ./client:/app/client
      - /app/client/node_modules

networks:
  default:
    name: pulse-network
